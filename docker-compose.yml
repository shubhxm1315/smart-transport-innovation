version: '3.8'

services:
  # ─── PostgreSQL ───
  postgres:
    image: postgres:16-alpine
    container_name: tms-postgres
    environment:
      POSTGRES_DB: tmsdb
      POSTGRES_USER: tms
      POSTGRES_PASSWORD: tms
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tms -d tmsdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Spring Boot Backend ───
  tms-backend:
    build:
      context: ./tms-backend
      dockerfile: Dockerfile
    container_name: tms-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/tmsdb
      DB_USERNAME: tms
      DB_PASSWORD: tms
      JWT_SECRET: Y2hhbmdlLXRoaXMtaW4tcHJvZHVjdGlvbi10by1hLXNlY3VyZS1yYW5kb20ta2V5LWF0LWxlYXN0LTI1Ni1iaXRz
      CORS_ALLOWED_ORIGINS: http://localhost,http://localhost:3000
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/v3/api-docs > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─── React Frontend (Nginx) ───
  tms-frontend:
    build:
      context: ./tms-frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_BASE_URL: /api/v1
    container_name: tms-frontend
    depends_on:
      tms-backend:
        condition: service_healthy
    ports:
      - "80:80"

volumes:
  pgdata:

