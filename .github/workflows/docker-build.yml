# ============================================================
# Docker Build — Verify Dockerfiles build successfully
# Runs on pushes to main when Docker-relevant files change.
# Does NOT push to any registry (verify only).
# ============================================================
name: Docker Build

on:
  push:
    branches: [main]
    paths:
      - 'tms-backend/**'
      - 'tms-frontend/**'
      - 'docker-compose.yml'

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./tms-backend
          file: ./tms-backend/Dockerfile
          push: false
          tags: tms-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./tms-frontend
          file: ./tms-frontend/Dockerfile
          push: false
          tags: tms-frontend:ci
          build-args: |
            REACT_APP_API_BASE_URL=/api/v1
          cache-from: type=gha
          cache-to: type=gha,mode=max

